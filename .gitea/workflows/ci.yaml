name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: apt-get update -qq && apt-get install -y -qq python3-yaml > /dev/null 2>&1

      - name: Validate YAML
        run: |
          ERRORS=0
          for f in $(find . -name '*.yaml' -not -path './.git/*'); do
            if python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>/dev/null; then
              echo "✅ $f"
            else
              echo "❌ $f"; ERRORS=1
            fi
          done
          exit $ERRORS

      - name: Check for secrets
        run: |
          FOUND=0
          grep -rn "password:\s*['\"].*['\"]" platform/ apps/ --include='*.yaml' | grep -v "REPLACE\|changeme\|HOMEPAGE_VAR\|existingSecret\|authentik-db-pass" && FOUND=1 || true
          [ $FOUND -eq 1 ] && exit 1
          echo "✅ No hardcoded secrets"
