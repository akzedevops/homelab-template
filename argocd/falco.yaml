apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: "*"
    helm:
      values: |
        driver:
          kind: modern_ebpf
        falco:
          grpc:
            enabled: true
          grpc_output:
            enabled: true
          json_output: true
          log_level: info
          rules_files:
            - /etc/falco/falco_rules.yaml
            - /etc/falco/rules.d
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        falcosidekick:
          enabled: true
          config:
            prometheus:
              extralabels: "source:falco"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        serviceMonitor:
          enabled: true
          labels:
            release: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
