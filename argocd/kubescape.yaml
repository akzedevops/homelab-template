apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubescape
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubescape.github.io/helm-charts
    chart: kubescape-operator
    targetRevision: "*"
    helm:
      values: |
        capabilities:
          continuousScan: disable
          nodeScan: disable
          vulnerabilityScan: enable
          configurationScan: enable
        nodeAgent:
          enabled: false
        kubescape:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kubescape
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
