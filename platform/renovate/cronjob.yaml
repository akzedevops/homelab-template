apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: gitea
spec:
  schedule: "0 3 * * 6"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:latest
              env:
                - name: RENOVATE_PLATFORM
                  value: gitea
                - name: RENOVATE_ENDPOINT
                  value: http://gitea-http.gitea.svc.cluster.local:3000
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-token
                      key: token
                - name: RENOVATE_REPOSITORIES
                  value: '["admin/homelab"]'
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: LOG_LEVEL
                  value: info
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          restartPolicy: Never
      backoffLimit: 1
