apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: docs
  namespace: docs
  annotations:
    external-dns.alpha.kubernetes.io/target: "<TUNNEL-UUID>.cfargotunnel.com"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`docs.example.com`)
      middlewares:
        - name: crowdsec-bouncer
          namespace: traefik
      services:
        - name: docs
          port: 80
  tls: {}
