experimental:
  plugins:
    traefik-oidc-auth:
      moduleName: github.com/sevensolutions/traefik-oidc-auth
      version: v0.19.0
ingressRoute:
  dashboard:
    enabled: false
service:
  type: LoadBalancer
providers:
  kubernetesCRD:
    allowCrossNamespace: true
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
metrics:
  prometheus:
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: monitoring
logs:
  access:
    enabled: true
    format: json
    fields:
      headers:
        defaultMode: drop
deployment:
  replicas: 2
api:
  insecure: true
  dashboard: true
ports:
  traefik:
    expose:
      default: true
  metrics:
    expose:
      default: true
  websecure:
    forwardedHeaders:
      trustedIPs:
        - 10.117.0.0/16
        - 10.116.0.0/16
