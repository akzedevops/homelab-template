apiVersion: v1
data:
  argocd.json: '{"title": "ArgoCD", "tags": ["argocd"], "timezone": "browser", "refresh":
    "30s", "uid": "argocd-custom", "panels": [{"title": "Apps Total", "type": "stat",
    "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "targets": [{"expr": "count(argocd_app_info)",
    "refId": "A"}], "datasource": {"uid": "prometheus"}, "fieldConfig": {"defaults":
    {"color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"title": "Synced", "type":
    "stat", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}, "targets": [{"expr": "count(argocd_app_info{sync_status=\"Synced\"})",
    "refId": "A"}], "datasource": {"uid": "prometheus"}, "fieldConfig": {"defaults":
    {"color": {"mode": "fixed", "fixedColor": "green"}}}}, {"title": "Out of Sync",
    "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "targets": [{"expr":
    "count(argocd_app_info{sync_status!=\"Synced\"})", "refId": "A"}], "datasource":
    {"uid": "prometheus"}, "fieldConfig": {"defaults": {"color": {"mode": "fixed",
    "fixedColor": "red"}, "thresholds": {"steps": [{"value": 0, "color": "green"},
    {"value": 1, "color": "red"}]}}}}, {"title": "Unhealthy", "type": "stat", "gridPos":
    {"h": 4, "w": 6, "x": 18, "y": 0}, "targets": [{"expr": "count(argocd_app_info{health_status!=\"Healthy\"})",
    "refId": "A"}], "datasource": {"uid": "prometheus"}, "fieldConfig": {"defaults":
    {"color": {"mode": "fixed", "fixedColor": "orange"}, "thresholds": {"steps": [{"value":
    0, "color": "green"}, {"value": 1, "color": "orange"}]}}}}, {"title": "App Sync
    Status", "type": "table", "gridPos": {"h": 10, "w": 12, "x": 0, "y": 4}, "targets":
    [{"expr": "argocd_app_info", "refId": "A", "format": "table", "instant": true}],
    "datasource": {"uid": "prometheus"}, "transformations": [{"id": "organize", "options":
    {"excludeByName": {"Time": true, "__name__": true, "instance": true, "job": true,
    "project": true}}}]}, {"title": "Sync Activity", "type": "timeseries", "gridPos":
    {"h": 10, "w": 12, "x": 12, "y": 4}, "targets": [{"expr": "sum by (name) (rate(argocd_app_sync_total[5m]))",
    "refId": "A", "legendFormat": "{{name}}"}], "datasource": {"uid": "prometheus"}},
    {"title": "ArgoCD Logs", "type": "logs", "gridPos": {"h": 8, "w": 24, "x": 0,
    "y": 14}, "targets": [{"expr": "{namespace=\"argocd\",container=\"application-controller\"}
    | json | __error__=\"\"", "refId": "A"}], "datasource": {"uid": "P8E80F9AEF21F6940"}}]}'
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: grafana-dashboard-argocd
  namespace: monitoring
