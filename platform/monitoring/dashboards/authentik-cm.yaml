apiVersion: v1
data:
  authentik.json: '{"title": "Authentik SSO", "tags": ["authentik", "sso"], "timezone":
    "browser", "refresh": "30s", "uid": "authentik-custom", "panels": [{"title": "Total
    Logins", "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "targets":
    [{"expr": "sum(authentik_login_total)", "refId": "A"}], "datasource": {"uid":
    "prometheus"}, "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor":
    "blue"}}}}, {"title": "Failed Logins", "type": "stat", "gridPos": {"h": 4, "w":
    6, "x": 6, "y": 0}, "targets": [{"expr": "sum(authentik_login_failed_total)",
    "refId": "A"}], "datasource": {"uid": "prometheus"}, "fieldConfig": {"defaults":
    {"color": {"mode": "fixed", "fixedColor": "red"}, "thresholds": {"steps": [{"value":
    0, "color": "green"}, {"value": 1, "color": "red"}]}}}}, {"title": "Outpost Connections",
    "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "targets": [{"expr":
    "sum(authentik_outpost_connection)", "refId": "A"}], "datasource": {"uid": "prometheus"},
    "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "green"}}}},
    {"title": "Login Rate", "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 18, "y":
    0}, "targets": [{"expr": "sum(rate(authentik_login_total[5m]))*60", "refId": "A"}],
    "datasource": {"uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "rpm",
    "color": {"mode": "fixed", "fixedColor": "purple"}}}}, {"title": "Logins Over
    Time", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "targets":
    [{"expr": "sum(rate(authentik_login_total[5m]))", "refId": "A", "legendFormat":
    "Success"}, {"expr": "sum(rate(authentik_login_failed_total[5m]))", "refId": "B",
    "legendFormat": "Failed"}], "datasource": {"uid": "prometheus"}}, {"title": "Logins
    by Application", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y":
    4}, "targets": [{"expr": "sum by (app) (rate(authentik_login_total[5m]))", "refId":
    "A", "legendFormat": "{{app}}"}], "datasource": {"uid": "prometheus"}}, {"title":
    "Authentik Logs", "type": "logs", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
    "targets": [{"expr": "{namespace=\"authentik\"}", "refId": "A"}], "datasource":
    {"uid": "P8E80F9AEF21F6940"}}]}'
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: grafana-dashboard-authentik
  namespace: monitoring
